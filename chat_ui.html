<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Service</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #2c3e50; color: white; padding: 1rem; text-align: center; font-weight: bold; }
        .config-bar { background: white; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; justify-content: center; flex-wrap: wrap; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background-color: #007bff; color: white; border-bottom-right-radius: 2px; }
        .assistant { align-self: flex-start; background-color: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }
        .input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: none; height: 40px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status-msg { font-size: 12px; color: #666; text-align: center; margin: 5px 0; font-style: italic; }
        .diag-box { border: 1px solid #ddd; padding: 10px; margin: 10px 0; background: #fffbe6; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">AI Core Chat Service</div>

<div class="config-bar">
    <input type="text" id="userId" placeholder="User ID" value="user-123">
    <input type="text" id="sessionId" placeholder="Session ID (UUID)" style="width: 300px;">
    <button onclick="generateUUID()" style="background-color: #007bff;">New Session</button>
    <button onclick="loadHistory()" style="background-color: #17a2b8;">Load History</button>
    <button onclick="runDiagnostics()" style="background-color: #6c757d;">Run UI Test</button>
</div>

<div id="chat-window"></div>

<div class="input-area">
    <textarea id="userInput" placeholder="Type your message..." onkeydown="handleKeyPress(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
    const API_BASE = "http://localhost:8000/api/v1";

    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault(); // Prevent default newline
            sendMessage();
        }
    }
    
    function generateUUID() {
        console.log("Generating new session...");
        let uuid = "";
        try {
            if (window.crypto && window.crypto.randomUUID) {
                uuid = window.crypto.randomUUID();
            } else {
                throw new Error("randomUUID not available");
            }
        } catch (e) {
            // Fallback implementation
            uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        document.getElementById('sessionId').value = uuid;
        document.getElementById('chat-window').innerHTML = `<div class="status-msg">Session reset: ${uuid}</div>`;
        return uuid;
    }

    // Set a default UUID on load
    window.onload = generateUUID;

    function appendMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    async function loadHistory() {
        const userId = document.getElementById('userId').value;
        const sessionId = document.getElementById('sessionId').value;
        const win = document.getElementById('chat-window');
        win.innerHTML = '<div class="status-msg">Loading history...</div>';

        try {
            const resp = await fetch(`${API_BASE}/sessions/${sessionId}/history?user_id=${userId}`);
            if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
            
            const data = await resp.json();
            win.innerHTML = `<div class="status-msg">History loaded for ${sessionId}</div>`;
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(m => appendMessage(m.role, m.content));
            } else {
                win.innerHTML += '<div class="status-msg">No previous messages found.</div>';
            }
        } catch (e) {
            win.innerHTML = `<div class="diag-box" style="color:red">Error: ${e.message}</div>`;
        }
    }

    function runDiagnostics() {
        const win = document.getElementById('chat-window');
        win.innerHTML = '<div class="diag-box"><strong>Running Diagnostics...</strong></div>';
        
        // 1. UUID Test
        const oldVal = document.getElementById('sessionId').value;
        const newVal = generateUUID();
        const uuidOk = (oldVal !== newVal) && newVal.length > 20;
        
        // 2. DOM Test
        const b = appendMessage('assistant', 'Test Bubble');
        const domOk = !!b;

        win.innerHTML = `
            <div class="diag-box">
                <strong>Diagnostic Results:</strong><br>
                ${uuidOk ? '✅' : '❌'} UUID Generation: ${uuidOk ? 'OK' : 'FAIL'}<br>
                ${domOk ? '✅' : '❌'} UI Rendering: ${domOk ? 'OK' : 'FAIL'}<br>
                Checking backend connection...
            </div>
        `;

        fetch(`${API_BASE}/health`)
            .then(r => r.json())
            .then(d => {
                win.innerHTML += `<div class="diag-box" style="background:#e6fffa">✅ Backend Online: ${JSON.stringify(d)}</div>`;
            })
            .catch(e => {
                win.innerHTML += `<div class="diag-box" style="background:#fff5f5; color:red">❌ Backend Offline: ${e.message}<br><small>Make sure Docker is running on port 8000</small></div>`;
            });
    }

    async function sendMessage() {
        const userId = document.getElementById('userId').value;
        const sessionId = document.getElementById('sessionId').value;
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const message = input.value.trim();

        if (!message) return;

        appendMessage('user', message);
        input.value = '';
        const aiBubble = appendMessage('assistant', '...');
        let aiText = "";
        
        sendBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/chat/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, user_id: userId, message: message })
            });

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                lines.forEach(line => {
                    if (line.startsWith('data: ')) {
                        try {
                            const payload = JSON.parse(line.substring(6));
                            if (payload.text) {
                                if (aiText === "") aiBubble.innerText = "";
                                aiText += payload.text;
                                aiBubble.innerText = aiText;
                            }
                        } catch (err) { }
                    }
                });
            }
        } catch (e) {
            aiBubble.innerText = `Error: ${e.message}`;
            aiBubble.style.color = 'red';
        } finally {
            sendBtn.disabled = false;
        }
    }
</script>

</body>
</html>
